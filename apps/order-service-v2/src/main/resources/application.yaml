# order-service v2 的 Spring Boot 配置。
server:
  # order-service 监听 8080。
  port: 8080

management:
  tracing:
    sampling:
      # 本地实验 100% trace 采样。
      probability: 1.0
  otlp:
    tracing:
      # trace 上报到 OTel Collector。
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.observability:4318/v1/traces}
    metrics:
      export:
        # metrics 上报到 OTel Collector。
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.observability:4318/v1/metrics}
  endpoints:
    web:
      exposure:
        # 暴露 health/prometheus。
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        # 开启 K8s 探针 endpoint。
        enabled: true

spring:
  application:
    # 应用名，v1/v2 保持一致，表示同一个逻辑服务的两个版本。
    name: order-service

