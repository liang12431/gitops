# user-service 的 Spring Boot 配置。
server:
  # user-service 监听 8080；K8s Service/Istio VirtualService 都转发到这个端口。
  port: 8080

management:
  tracing:
    sampling:
      # 本地实验 100% trace 采样，方便在 OTel Collector 日志里看到链路。
      probability: 1.0
  otlp:
    tracing:
      # trace 上报到 OTel Collector。
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.observability:4318/v1/traces}
    metrics:
      export:
        # metrics 上报到 OTel Collector。
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.observability:4318/v1/metrics}
  endpoints:
    web:
      exposure:
        # 暴露 health/prometheus，供 K8s 探针和 Prometheus 使用。
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        # 开启 liveness/readiness endpoint。
        enabled: true

spring:
  application:
    # 应用名，出现在日志、trace、metrics 中。
    name: user-service

