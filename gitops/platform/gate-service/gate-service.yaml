apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate-service
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gate-service
  template:
    metadata:
      labels:
        app: gate-service
    spec:
      containers:
        - name: gate-service
          image: localhost:5001/demo/gate-service:0.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gate-service
  namespace: demo
spec:
  selector:
    app: gate-service
  ports:
    - name: http
      port: 8080
      targetPort: http
