# ArgoCD Application：部署 order-api Deployment/Service。
# Flagger 后续会接管 Service/order-api 的 selector/ports，因此这里要配置 ignoreDifferences。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/liang12431/gitops.git
    targetRevision: HEAD
    path: gitops/applications/order-api/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Service
      name: order-api
      namespace: demo
      jsonPointers:
        # Flagger 会把 Service/order-api 指向 order-api-primary。
        - /spec/selector
        # Flagger 可能把 targetPort 从 http 解析为 8080。
        - /spec/ports

