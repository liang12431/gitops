# ArgoCD Application：部署 user-service 及其 Istio Gateway/VirtualService/ServiceEntry。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/liang12431/gitops.git
    targetRevision: HEAD
    path: gitops/applications/user-service/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

