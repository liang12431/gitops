apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: demo-api
  namespace: demo
spec:
  provider: istio
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-api
  progressDeadlineSeconds: 600
  service:
    port: 8080
    gateways:
      - demo-gateway
    hosts:
      - demo-istio.local
    match:
      - uri:
          prefix: /
  analysis:
    interval: 30s
    threshold: 1
    iterations: 1
    match:
      - headers:
          x-canary:
            exact: "true"
    webhooks:
      - name: check promotion confirmation status
        type: confirm-promotion
        url: http://gate-service.demo:8080/gate/promotion/check
      - name: check rollback confirmation status
        type: rollback
        url: http://gate-service.demo:8080/gate/rollback/check
